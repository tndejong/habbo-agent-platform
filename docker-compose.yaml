volumes:
  volume-mysql:
  volume-arcturus-maven-repo:
  volume-arcturus-target:
  volume-nitro-converter-node-modules:
  volume-nitro-react-node-modules:

services:
  arcturus:
    container_name: arcturus
    build:
      context: emulator
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    volumes:
      - ./emulator/:/app/
      - volume-arcturus-target:/app/arcturus/target
      - volume-arcturus-maven-repo:/root/.m2
    ports:
      - ${HABBO_GAME_PORT:-3000}:3000
      - 127.0.0.1:${HABBO_RCON_PORT:-3001}:3001
      - ${HABBO_WS_BIND_PORT:-2096}:2096
    depends_on:
      - mysql
    networks:
      nitro:

  nitro:
    container_name: nitro
    build:
      context: nitro
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    volumes:
      - ./nitro/:/app/
      - volume-nitro-converter-node-modules:/app/nitro-converter/node_modules
      - volume-nitro-react-node-modules:/app/nitro-react/node_modules
    ports:
      - ${HABBO_NITRO_BIND_PORT:-1080}:5154
      - ${HABBO_ASSETS_BIND_PORT:-8080}:8080
      - ${HABBO_SWF_BIND_PORT:-8081}:8081
    networks:
      nitro:

  mysql:
    container_name: mysql
    image: mariadb:10.6
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=arcturus_root_pw
      - MYSQL_USER=arcturus_user
      - MYSQL_PASSWORD=arcturus_pw
      - MYSQL_DATABASE=arcturus
    volumes:
      - volume-mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/dumps:/docker-entrypoint-initdb.d
    ports:
      - 127.0.0.1:${HABBO_DB_PORT:-13306}:3306
    networks:
      nitro:

  mailpit:
    container_name: mailpit
    image: axllent/mailpit:latest
    ports:
      - 127.0.0.1:${HABBO_MAILPIT_SMTP_PORT:-1025}:1025
      - 127.0.0.1:${HABBO_MAILPIT_UI_PORT:-8025}:8025
    networks:
      nitro:

  agent-portal:
    container_name: agent-portal
    build:
      context: ./portal
    environment:
      - PORT=3000
      - HABBO_BASE_URL=${HABBO_PORTAL_BASE_URL:-http://127.0.0.1:1080}
      - HABBO_HEALTHCHECK_URL=${HABBO_PORTAL_HEALTHCHECK_URL:-http://nitro:5154}
      - PORTAL_JWT_SECRET=${HABBO_PORTAL_JWT_SECRET:-change-this-in-production}
      - PORTAL_COOKIE_SECURE=${HABBO_PORTAL_COOKIE_SECURE:-false}
      - PORTAL_PUBLIC_URL=${HABBO_PORTAL_PUBLIC_URL:-http://127.0.0.1:3090}
      - PORTAL_BOOTSTRAP_ENABLED=${HABBO_PORTAL_BOOTSTRAP_ENABLED:-true}
      - PORTAL_BOOTSTRAP_EMAIL=${HABBO_PORTAL_BOOTSTRAP_EMAIL:-systemaccount@hotel.local}
      - PORTAL_BOOTSTRAP_USERNAME=${HABBO_PORTAL_BOOTSTRAP_USERNAME:-Systemaccount}
      - PORTAL_BOOTSTRAP_PASSWORD=${HABBO_PORTAL_BOOTSTRAP_PASSWORD:-ChangeMeNow123!}
      - PORTAL_BOOTSTRAP_HABBO_USERNAME=${HABBO_PORTAL_BOOTSTRAP_HABBO_USERNAME:-Systemaccount}
      - PORTAL_RESET_TOKEN_TTL_MINUTES=${HABBO_PORTAL_RESET_TOKEN_TTL_MINUTES:-30}
      - PORTAL_SMTP_HOST=${HABBO_PORTAL_SMTP_HOST:-mailpit}
      - PORTAL_SMTP_PORT=${HABBO_PORTAL_SMTP_PORT:-1025}
      - PORTAL_SMTP_SECURE=${HABBO_PORTAL_SMTP_SECURE:-false}
      - PORTAL_SMTP_FROM=${HABBO_PORTAL_SMTP_FROM:-Agent Hotel <no-reply@hotel.local>}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASSWORD=arcturus_pw
    ports:
      - ${HABBO_PORTAL_PORT:-3090}:3000
    depends_on:
      - mysql
      - mailpit
    networks:
      nitro:

  habbo-ai-service:
    container_name: habbo-ai-service
    build:
      context: ./habbo-ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - AI_SERVICE_PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASSWORD=arcturus_pw
    ports:
      - "127.0.0.1:${HABBO_AI_SERVICE_PORT:-3002}:3002"
    depends_on:
      - mysql
    networks:
      nitro:

  habbo-mcp:
    container_name: habbo-mcp
    build:
      context: ./habbo-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - RCON_HOST=arcturus
      - RCON_PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASSWORD=arcturus_pw
      - HABBO_BASE_URL=${HABBO_PORTAL_BASE_URL:-http://127.0.0.1:1080}
      - MCP_TRANSPORT=http
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=3003
      - MCP_ALLOW_STATIC_API_KEY_FALLBACK=false
      - MCP_API_KEY=${HABBO_MCP_FALLBACK_API_KEY:-}
    ports:
      - "127.0.0.1:${HABBO_MCP_PORT:-3003}:3003"
    depends_on:
      - mysql
      - arcturus
    networks:
      nitro:

networks:
  nitro:
    ipam:
      config:
        - subnet: ${HABBO_DOCKER_SUBNET:-172.20.0.0/16}
