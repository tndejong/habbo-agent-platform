volumes:
  volume-mysql:
  volume-nitro-assets:

services:
  arcturus:
    container_name: arcturus
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/habbo-arcturus:latest
    entrypoint:
      - /bin/bash
      - /app/scripts/build.sh
    environment:
      - HABBO_SQL_BASE_URL=${HABBO_SQL_BASE_URL:-https://raw.githubusercontent.com/tndejong/habbo-agent-platform/main/mysql/dumps}
      - HABBO_SQL_BASE_FILE=${HABBO_SQL_BASE_FILE:-arcturus_3.0.0-stable_base_database--compact.sql}
      - HABBO_SQL_MIGRATION_FILE=${HABBO_SQL_MIGRATION_FILE:-arcturus_migration_3.0.0_to_3.5.0.sql}
      - RCON_ALLOWED=${HABBO_RCON_ALLOWED:-127.0.0.1}
    ports:
      - ${HABBO_GAME_PORT:-3000}:3000
      - 127.0.0.1:${HABBO_RCON_PORT:-3001}:3001
      - ${HABBO_WS_BIND_PORT:-2096}:2096
    depends_on:
      - mysql
    networks:
      nitro:

  nitro:
    container_name: nitro
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/habbo-nitro:latest
    entrypoint:
      - /bin/sh
      - -lc
      - |
        /bin/sh /app/scripts/build.sh &
        pid=$$!
        while kill -0 "$$pid" >/dev/null 2>&1; do
          if [ -d /app/nitro-assets/gamedata ]; then
            [ -f /app/nitro-assets/gamedata/ExternalTextsOverride.json ] || echo '{}' > /app/nitro-assets/gamedata/ExternalTextsOverride.json
            [ -f /app/nitro-assets/gamedata/Exter_exts_override.json ] || echo '{}' > /app/nitro-assets/gamedata/Exter_exts_override.json
          fi
          sleep 2
        done
        wait "$$pid"
    volumes:
      - volume-nitro-assets:/app/nitro-assets
    environment:
      - HABBO_PUBLIC_HOST=${HABBO_PUBLIC_HOST:-127.0.0.1}
      - HABBO_PUBLIC_PROTOCOL=${HABBO_PUBLIC_PROTOCOL:-http}
      - HABBO_WS_PORT=${HABBO_WS_PORT:-2096}
      - HABBO_WS_PUBLIC_HOST=${HABBO_WS_PUBLIC_HOST:-}
      - HABBO_WS_PUBLIC_PORT=${HABBO_WS_PUBLIC_PORT:-}
      - HABBO_WS_PUBLIC_PROTOCOL=${HABBO_WS_PUBLIC_PROTOCOL:-}
      - HABBO_ASSETS_PUBLIC_PORT=${HABBO_ASSETS_PUBLIC_PORT:-8080}
      - HABBO_SWF_PUBLIC_PORT=${HABBO_SWF_PUBLIC_PORT:-8081}
    ports:
      - ${HABBO_NITRO_BIND_PORT:-1080}:5154
      - ${HABBO_ASSETS_BIND_PORT:-8080}:8080
      - ${HABBO_SWF_BIND_PORT:-8081}:8081
    networks:
      nitro:

  mysql:
    container_name: mysql
    image: mariadb:10.6
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=arcturus_root_pw
      - MYSQL_USER=arcturus_user
      - MYSQL_PASSWORD=arcturus_pw
      - MYSQL_DATABASE=arcturus
    volumes:
      - volume-mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/dumps:/docker-entrypoint-initdb.d
    ports:
      - 127.0.0.1:${HABBO_DB_PORT:-13306}:3306
    networks:
      nitro:

  mailpit:
    container_name: mailpit
    image: axllent/mailpit:latest
    ports:
      - 127.0.0.1:${HABBO_MAILPIT_SMTP_PORT:-1025}:1025
      - 127.0.0.1:${HABBO_MAILPIT_UI_PORT:-8025}:8025
    networks:
      nitro:

  agent-portal:
    container_name: agent-portal
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/agent-portal:latest
    restart: unless-stopped
    environment:
      - PORT=3000
      - HABBO_BASE_URL=${HABBO_PORTAL_BASE_URL:-http://127.0.0.1:${HABBO_NITRO_BIND_PORT:-1080}}
      - HABBO_HEALTHCHECK_URL=${HABBO_PORTAL_HEALTHCHECK_URL:-http://nitro:5154}
      - PORTAL_JWT_SECRET=${HABBO_PORTAL_JWT_SECRET:-change-this-in-production}
      - PORTAL_COOKIE_SECURE=${HABBO_PORTAL_COOKIE_SECURE:-false}
      - PORTAL_PUBLIC_URL=${HABBO_PORTAL_PUBLIC_URL:-http://127.0.0.1:${HABBO_PORTAL_PORT:-3090}}
      - PORTAL_BOOTSTRAP_ENABLED=${HABBO_PORTAL_BOOTSTRAP_ENABLED:-true}
      - PORTAL_BOOTSTRAP_EMAIL=${HABBO_PORTAL_BOOTSTRAP_EMAIL:-systemaccount@hotel.local}
      - PORTAL_BOOTSTRAP_USERNAME=${HABBO_PORTAL_BOOTSTRAP_USERNAME:-Systemaccount}
      - PORTAL_BOOTSTRAP_PASSWORD=${HABBO_PORTAL_BOOTSTRAP_PASSWORD:-ChangeMeNow123!}
      - PORTAL_BOOTSTRAP_HABBO_USERNAME=${HABBO_PORTAL_BOOTSTRAP_HABBO_USERNAME:-Systemaccount}
      - PORTAL_RESET_TOKEN_TTL_MINUTES=${HABBO_PORTAL_RESET_TOKEN_TTL_MINUTES:-30}
      - PORTAL_SMTP_HOST=${HABBO_PORTAL_SMTP_HOST:-mailpit}
      - PORTAL_SMTP_PORT=${HABBO_PORTAL_SMTP_PORT:-1025}
      - PORTAL_SMTP_SECURE=${HABBO_PORTAL_SMTP_SECURE:-false}
      - PORTAL_SMTP_FROM=${HABBO_PORTAL_SMTP_FROM:-Agent Hotel <no-reply@hotel.local>}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASSWORD=arcturus_pw
      - IMAGER_URL=${HABBO_IMAGER_URL:-http://nitro-imager:3005}
      - AI_SERVICE_URL=${HABBO_AI_SERVICE_URL:-http://habbo-ai-service:3002}
      - RCON_HOST=${HABBO_RCON_HOST:-arcturus}
      - RCON_PORT=${HABBO_RCON_PORT:-3001}
      - AGENT_TRIGGER_URL=${HABBO_AGENT_TRIGGER_URL:-http://agent-trigger:3004}
      - PORTAL_INTERNAL_SECRET=${HABBO_PORTAL_INTERNAL_SECRET:-change-this-secret}
      - MCP_API_KEY=${HABBO_MCP_FALLBACK_API_KEY:-}
      - HABBO_MCP_URL=${HABBO_MCP_URL:-http://habbo-mcp:3003/mcp}
    ports:
      - ${HABBO_PORTAL_PORT:-3090}:3000
    depends_on:
      - mysql
      - mailpit
    networks:
      nitro:

  nitro-imager:
    container_name: nitro-imager
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/nitro-imager:latest
    volumes:
      - volume-nitro-assets:/assets:ro
    environment:
      - PORT=3005
      - FIGURE_DIR=/assets/bundled/figure
      - GAMEDATA_DIR=/assets/gamedata
    ports:
      - "127.0.0.1:${HABBO_IMAGER_PORT:-3005}:3005"
    networks:
      nitro:

  habbo-ai-service:
    container_name: habbo-ai-service
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/habbo-ai-service:latest
    restart: unless-stopped
    environment:
      - AI_SERVICE_PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASSWORD=arcturus_pw
    ports:
      - "127.0.0.1:${HABBO_AI_SERVICE_PORT:-3002}:3002"
    depends_on:
      - mysql
    networks:
      nitro:

  habbo-mcp:
    container_name: habbo-mcp
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/habbo-mcp:latest
    restart: unless-stopped
    environment:
      - RCON_HOST=arcturus
      - RCON_PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASSWORD=arcturus_pw
      - HABBO_BASE_URL=${HABBO_PORTAL_BASE_URL:-http://127.0.0.1:${HABBO_NITRO_BIND_PORT:-1080}}
      - MCP_TRANSPORT=http
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=3003
      - MCP_ALLOW_STATIC_API_KEY_FALLBACK=true
      - MCP_API_KEY=${HABBO_MCP_FALLBACK_API_KEY:-}
    ports:
      - "127.0.0.1:${HABBO_MCP_PORT:-3003}:3003"
    depends_on:
      - mysql
      - arcturus
    networks:
      nitro:

  agent-trigger:
    container_name: agent-trigger
    image: ghcr.io/${HABBO_OWNER_OR_ORG}/agent-trigger:latest
    restart: unless-stopped
    environment:
      - HABBO_AGENT_TRIGGER_PORT=3004
      - HABBO_PROJECT_DIR=/project
      - HABBO_MCP_URL=${HABBO_MCP_URL:-http://habbo-mcp:3003/mcp}
      - HABBO_PUBLIC_URL=${HABBO_PUBLIC_URL:-https://trigger.thepixeloffice.ai}
      - HABBO_ALLOWED_PHONE_NUMBERS=${HABBO_ALLOWED_PHONE_NUMBERS:-}
      - MCP_API_KEY=${HABBO_MCP_FALLBACK_API_KEY:-}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - ANTHROPIC_API_KEY=${HABBO_ANTHROPIC_API_KEY}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - HABBO_HOOK_ENABLED=false
      - PORTAL_URL=${HABBO_PORTAL_INTERNAL_URL:-http://agent-portal:3000}
      - PORTAL_INTERNAL_SECRET=${HABBO_PORTAL_INTERNAL_SECRET:-change-this-secret}
    volumes:
      - .:/project:ro
    ports:
      - "127.0.0.1:${HABBO_AGENT_TRIGGER_PORT:-3004}:3004"
    depends_on:
      - habbo-mcp
    networks:
      nitro:

networks:
  nitro:
    ipam:
      config:
        - subnet: ${HABBO_DOCKER_SUBNET:-172.28.0.0/16}
