version: '3.7'

volumes:
  volume-mysql:

services:
  arcturus:
    container_name: arcturus
    image: ghcr.io/OWNER_OR_ORG/habbo-arcturus:latest
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    ports:
      - 3000:3000
      - 127.0.0.1:3001:3001
      - 2096:2096
    depends_on:
      - mysql
    networks:
      nitro:

  nitro:
    container_name: nitro
    image: ghcr.io/OWNER_OR_ORG/habbo-nitro:latest
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    ports:
      - 1080:5154
      - 8080:8080
      - 8081:8081
    networks:
      nitro:

  mysql:
    container_name: mysql
    image: mariadb:10.6
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=arcturus_root_pw
      - MYSQL_USER=arcturus_user
      - MYSQL_PASSWORD=arcturus_pw
      - MYSQL_DATABASE=arcturus
    volumes:
      - volume-mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/dumps:/docker-entrypoint-initdb.d
    ports:
      - 127.0.0.1:13306:3306
    networks:
      nitro:

networks:
  nitro:
    ipam:
      config:
        - subnet: 172.20.0.0/16
