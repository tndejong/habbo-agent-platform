name: Publish Containers

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Normalize image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (arcturus)
        id: meta_arcturus
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/habbo-arcturus
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push arcturus image
        uses: docker/build-push-action@v6
        with:
          context: ./emulator
          file: ./emulator/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=habbo-arcturus
          cache-to: type=gha,mode=max,scope=habbo-arcturus
          tags: ${{ steps.meta_arcturus.outputs.tags }}
          labels: ${{ steps.meta_arcturus.outputs.labels }}

      - name: Extract metadata (nitro)
        id: meta_nitro
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/habbo-nitro
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push nitro image
        uses: docker/build-push-action@v6
        with:
          context: ./nitro
          file: ./nitro/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=habbo-nitro
          cache-to: type=gha,mode=max,scope=habbo-nitro
          tags: ${{ steps.meta_nitro.outputs.tags }}
          labels: ${{ steps.meta_nitro.outputs.labels }}

      - name: Extract metadata (nitro-imager)
        id: meta_nitro_imager
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/nitro-imager
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push nitro-imager image
        uses: docker/build-push-action@v6
        with:
          context: ./nitro-imager
          file: ./nitro-imager/Dockerfile
          push: true
          # node-canvas dependency build is currently unstable under qemu arm64 emulation.
          platforms: linux/amd64
          cache-from: type=gha,scope=nitro-imager
          cache-to: type=gha,mode=max,scope=nitro-imager
          tags: ${{ steps.meta_nitro_imager.outputs.tags }}
          labels: ${{ steps.meta_nitro_imager.outputs.labels }}

      - name: Extract metadata (habbo-ai-service)
        id: meta_ai_service
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/habbo-ai-service
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push habbo-ai-service image
        uses: docker/build-push-action@v6
        with:
          context: ./habbo-ai-service
          file: ./habbo-ai-service/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=habbo-ai-service
          cache-to: type=gha,mode=max,scope=habbo-ai-service
          tags: ${{ steps.meta_ai_service.outputs.tags }}
          labels: ${{ steps.meta_ai_service.outputs.labels }}

      - name: Extract metadata (habbo-mcp)
        id: meta_mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/habbo-mcp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push habbo-mcp image
        uses: docker/build-push-action@v6
        with:
          context: ./habbo-mcp
          file: ./habbo-mcp/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=habbo-mcp
          cache-to: type=gha,mode=max,scope=habbo-mcp
          tags: ${{ steps.meta_mcp.outputs.tags }}
          labels: ${{ steps.meta_mcp.outputs.labels }}

      - name: Extract metadata (agent-trigger)
        id: meta_agent_trigger
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/agent-trigger
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push agent-trigger image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-trigger
          file: ./agent-trigger/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=agent-trigger
          cache-to: type=gha,mode=max,scope=agent-trigger
          tags: ${{ steps.meta_agent_trigger.outputs.tags }}
          labels: ${{ steps.meta_agent_trigger.outputs.labels }}

      - name: Extract metadata (agent-portal)
        id: meta_agent_portal
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/agent-portal
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push agent-portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./portal/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=agent-portal
          cache-to: type=gha,mode=max,scope=agent-portal
          tags: ${{ steps.meta_agent_portal.outputs.tags }}
          labels: ${{ steps.meta_agent_portal.outputs.labels }}

      - name: Trigger Portainer redeploy
        if: success()
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_DEPLOY_WEBHOOK_URL }}")
          echo "Portainer webhook HTTP $HTTP"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "204" ]; then
            echo "::warning::Portainer webhook returned HTTP $HTTP"
          fi

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Containers published",
                "description": "All images pushed to GHCR successfully.",
                "color": 3066993,
                "fields": [
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Commit", "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": true },
                  { "name": "Run", "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true }
                ]
              }]
            }'

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Container publish failed",
                "description": "One or more images failed to build or push.",
                "color": 15158332,
                "fields": [
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Commit", "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": true },
                  { "name": "Run", "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true }
                ]
              }]
            }'
